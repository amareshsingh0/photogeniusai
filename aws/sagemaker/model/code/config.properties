# TorchServe configuration for PhotoGenius Enterprise
# Must be in code/ directory of model.tar.gz to be respected by SageMaker DLC

# Model loading timeout: 30 minutes (S3 downloads ~34GB during model_fn)
model_load_timeout=1800

# Inference timeout: 15 minutes (sequential CPU offload is slow for first inference)
default_response_timeout=900

# Single worker only (24GB GPU can only hold 1 model at a time)
default_workers_per_model=1

# Queue size for buffering requests during model swap
job_queue_size=100

# Max payload size: 100MB (base64 images)
max_response_size=104857600
max_request_size=104857600
