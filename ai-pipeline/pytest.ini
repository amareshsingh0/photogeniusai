[pytest]
# Run from ai-pipeline: pytest tests/ -v -s
# Note: pytest-asyncio is optional. Some environments have incompatible versions
# that can break collection on pytest 8+. We disable it by default for stability.
# If/when we add async tests, remove `-p no:asyncio` and set: asyncio_mode = auto
testpaths = tests
pythonpath = .
addopts = -v --tb=short -p no:asyncio
markers =
    asyncio: mark test as async (requires pytest-asyncio)
    gpu: mark test as requiring GPU (skip with -m "not gpu")
    slow: mark test as slow (skip with -m "not slow")
    e2e: end-to-end integration test (skip with -m "not e2e")
