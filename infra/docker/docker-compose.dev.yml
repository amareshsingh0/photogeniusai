# Local development stack: Postgres + Redis + Web + API
# AI Service runs on Modal.com (cloud)
# Usage: docker compose -f infra/docker/docker-compose.dev.yml up -d
# Or: docker compose -f infra/docker/docker-compose.dev.yml up --build

services:
  # ==================== DATABASE & CACHE ====================
  postgres:
    image: postgres:16-alpine
    container_name: photogenius-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: photogenius
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - photogenius-network

  redis:
    image: redis:7-alpine
    container_name: photogenius-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - photogenius-network

  # ==================== APPLICATION SERVICES ====================
  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: photogenius-web
    ports:
      - "3000:3000"
    env_file:
      - ../../apps/web/.env.local
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/photogenius
      - REDIS_URL=redis://redis:6379
      - NEXT_PUBLIC_API_URL=http://api:8000
      - AI_SERVICE_URL=https://amareshsingh0--photogenius-ai-fastapi-app.modal.run
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - photogenius-network
    restart: unless-stopped
    volumes:
      - ../../apps/web:/app/apps/web
      - ../../node_modules:/app/node_modules

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: photogenius-api
    ports:
      - "8000:8000"
    env_file:
      - ../../apps/api/.env.local
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/photogenius
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=https://amareshsingh0--photogenius-ai-fastapi-app.modal.run
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - photogenius-network
    restart: unless-stopped
    volumes:
      - ../../apps/api:/app

  # AI Service removed - now running on Modal.com
  # AI_SERVICE_URL=https://amareshsingh0--photogenius-ai-generate.modal.run

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local

networks:
  photogenius-network:
    driver: bridge
